spring:
  application:
    name: chat-backend

  datasource:
    # Senior Staff Engineer - Production Fix:
    # The application now automatically prepends 'jdbc:' if missing.
    # We prioritize DB_URL as it is commonly used on Supabase/Render.
    url: ${DB_URL:${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/chatdb}}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:chatuser}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:chatpassword}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      initialization-fail-timeout: 0
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          ssl: ${JDBC_SSL:true}
          sslmode: ${JDBC_SSL_MODE:require}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_JAAS_CONFIG:}
    consumer:
      group-id: chat-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6380}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: ${PORT:8080}
  error:
    include-message: always

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: ERROR
    com.antigravity.chat: DEBUG

chat:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}